<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asignar Bonificaciones - Sistema de Peajes</title>
    <link rel="stylesheet" href="css/estilos.css">
    <script src="vistaWeb.js"></script>
</head>
<body>
    <script src="utilesVista.js"></script>
    
    <div class="admin-container">
        <div class="admin-card">
            <div class="admin-header">
                <div class="header-icon">🎁</div>
                <div>
                    <h1>Asignar Bonificaciones</h1>
                    <p class="header-subtitle">Gestione las bonificaciones de los propietarios del sistema.</p>
                </div>
            </div>

            <div class="form-section">
                <div class="form-row">
                    <div class="form-group">
                        <label for="cedulaPropietario">Cédula de identidad</label>
                        <input type="text" id="cedulaPropietario" placeholder="Ej: 12345678">
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end;">
                        <button class="btn-secundario" onclick="buscarPropietario()" style="width: 100%;">Buscar propietario</button>
                    </div>
                </div>

                <div id="infoPropietario" style="display: none; background: #d6eaf8; padding: 15px; border-radius: 6px; margin-bottom: 20px; border-left: 4px solid #3498db;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h4 style="margin: 0 0 10px 0;">Propietario</h4>
                        <button onclick="limpiarBusqueda()" style="background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;">Limpiar</button>
                    </div>
                    <p style="margin: 5px 0;"><strong>Nombre:</strong> <span id="nombrePropietario"></span></p>
                    <p style="margin: 5px 0;"><strong>Estado:</strong> <span id="estadoPropietario"></span></p>
                    <h4 style="margin: 15px 0 10px 0;">Bonificaciones asignadas</h4>
                    <div id="bonificacionesPropietario"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tipoBonificacion">Tipo de Bonificación</label>
                        <select id="tipoBonificacion">
                            <option value="">Seleccione un tipo...</option>
                            <option value="Trabajadores">Trabajadores</option>
                            <option value="Frecuentes">Frecuentes</option>
                            <option value="Exonerado">Exonerados</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="puestoPeaje">Puesto de Peaje</label>
                        <select id="puestoPeaje">
                            <option value="">Seleccione un puesto...</option>
                        </select>
                    </div>
                </div>

                <button class="btn-accion" onclick="asignarBonificacion()">Asignar Bonificación</button>
                <button class="btn-volver" onclick="volverAlTablero()">Volver al Panel</button>
            </div>

            <div id="mensajeResultado" class="mensaje-resultado" style="display: none;"></div>

            <div class="bonificaciones-section">
                <h3>Bonificaciones asignadas</h3>
                <div id="bonificacionesContainer" class="bonificaciones-container">
                    <p class="placeholder">Seleccione bonificaciones y puestos en la lista de izquierda y luego asigne.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        urlIniciarVista = "/bonificaciones/cargarVistaBonificaciones";
        
        function primerSubmitFinalizado() {
            cargarPuestos();
            cargarBonificaciones();
            // Restaurar datos del localStorage si existen
            restaurarDatosLocalStorage();
        }

        function mostrar_vistaBonificaciones(vista) {
            // Esta función se llama cuando se carga la vista inicialmente
            // No necesita hacer nada en particular, primerSubmitFinalizado se encarga del resto
        }
        
        window.addEventListener('DOMContentLoaded', function() {
        });

        function cargarPuestos() {
            submit('/puestoPeaje/obtenerPuestos');
        }

        function mostrar_puestosPeaje(puestos) {
            const select = document.getElementById('puestoPeaje');
            select.innerHTML = '<option value="">Seleccione un puesto...</option>';
            
            puestos.forEach(p => {
                const option = document.createElement('option');
                option.value = p.nombre;
                option.textContent = p.nombre + ' - ' + p.ubicacion;
                select.appendChild(option);
            });
        }

        function cargarBonificaciones() {
            // No cargar bonificaciones al inicio, solo mostrar mensaje inicial
            const container = document.getElementById('bonificacionesContainer');
            container.innerHTML = '<p class="placeholder">Seleccione bonificaciones y puestos en la lista de izquierda y luego asigne.</p>';
        }

        function buscarPropietario() {
            const cedula = document.getElementById('cedulaPropietario').value;
            
            if (!cedula) {
                mostrarMensaje('Por favor ingrese una cédula', 'error');
                return;
            }
            
            const params = `cedula=${encodeURIComponent(cedula)}`;
            submit('/propietario/obtenerUsuario?' + params);
            submit('/bonificaciones/obtenerBonificacionesPorCedula?' + params);
        }

        function mostrar_propietario(data) {
            document.getElementById('nombrePropietario').textContent = data.nombreCompleto;
            document.getElementById('estadoPropietario').textContent = data.estadoNombre;
            
            document.getElementById('infoPropietario').style.display = 'block';
            
            // Guardar en localStorage
            const datosGuardar = {
                cedula: document.getElementById('cedulaPropietario').value,
                nombreCompleto: data.nombreCompleto,
                estadoNombre: data.estadoNombre
            };
            localStorage.setItem('propietario_bonificaciones', JSON.stringify(datosGuardar));
        }

        function mostrar_bonificaciones(bonificaciones) {
            const divBonificaciones = document.getElementById('bonificacionesPropietario');
            if (bonificaciones && bonificaciones.length > 0) {
                let html = '<ul style="margin: 5px 0; padding-left: 20px;">';
                bonificaciones.forEach(b => {
                    html += `<li>${b.nombre} - ${b.puestoPeaje}</li>`;
                });
                html += '</ul>';
                divBonificaciones.innerHTML = html;
            } else {
                divBonificaciones.innerHTML = '<p style="margin: 5px 0; font-style: italic;">Sin bonificaciones asignadas</p>';
            }
            
            // Guardar bonificaciones en localStorage
            localStorage.setItem('bonificaciones_propietario', JSON.stringify(bonificaciones || []));
        }

        function restaurarDatosLocalStorage() {
            const datosGuardados = localStorage.getItem('propietario_bonificaciones');
            const bonificacionesGuardadas = localStorage.getItem('bonificaciones_propietario');
            
            if (datosGuardados) {
                try {
                    const datos = JSON.parse(datosGuardados);
                    
                    // Restaurar campo de cédula
                    document.getElementById('cedulaPropietario').value = datos.cedula || '';
                    
                    // Restaurar información del propietario
                    document.getElementById('nombrePropietario').textContent = datos.nombreCompleto || '';
                    document.getElementById('estadoPropietario').textContent = datos.estadoNombre || '';
                    document.getElementById('infoPropietario').style.display = 'block';
                    
                    // Restaurar bonificaciones si existen
                    if (bonificacionesGuardadas) {
                        const bonificaciones = JSON.parse(bonificacionesGuardadas);
                        const divBonificaciones = document.getElementById('bonificacionesPropietario');
                        
                        if (bonificaciones && bonificaciones.length > 0) {
                            let html = '<ul style="margin: 5px 0; padding-left: 20px;">';
                            bonificaciones.forEach(b => {
                                html += `<li>${b.nombre} - ${b.puestoPeaje}</li>`;
                            });
                            html += '</ul>';
                            divBonificaciones.innerHTML = html;
                        }
                    }
                } catch (e) {
                    console.error('Error al restaurar datos del localStorage:', e);
                }
            }
        }

        function mostrar_propietarioNoEncontrado(mensaje) {
            mostrarMensaje(mensaje || 'No existe el propietario', 'error');
            document.getElementById('infoPropietario').style.display = 'none';
            
            // Limpiar localStorage cuando no se encuentra el propietario
            localStorage.removeItem('propietario_bonificaciones');
            localStorage.removeItem('bonificaciones_propietario');
        }

        // Array para almacenar bonificaciones asignadas en esta sesión
        let bonificacionesAsignadas = [];

        function mostrar_bonificacionesAsignadas() {
            const container = document.getElementById('bonificacionesContainer');
            
            if (bonificacionesAsignadas.length === 0) {
                container.innerHTML = '<p class="placeholder">Seleccione bonificaciones y puestos en la lista de izquierda y luego asigne.</p>';
                return;
            }

            let html = '<table class="tabla-admin"><thead><tr><th>Propietario</th><th>Tipo</th><th>Puesto</th><th>Fecha Asignación</th></tr></thead><tbody>';
            
            bonificacionesAsignadas.forEach(b => {
                const fecha = b.fechaAsignacion ? new Date(b.fechaAsignacion + 'T00:00:00').toLocaleDateString('es-UY') : 'N/A';
                html += `<tr>
                    <td>${b.propietarioNombre || 'N/A'}</td>
                    <td>${b.nombre || 'N/A'}</td>
                    <td>${b.puestoPeaje || 'N/A'}</td>
                    <td>${fecha}</td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function asignarBonificacion() {
            const cedula = document.getElementById('cedulaPropietario').value;
            const tipoBonificacion = document.getElementById('tipoBonificacion').value;
            const puestoPeaje = document.getElementById('puestoPeaje').value;

            if (!cedula) {
                mostrarMensaje('Por favor ingrese una cédula', 'error');
                return;
            }

            if (!tipoBonificacion) {
                mostrarMensaje('Debe especificar una bonificación', 'error');
                return;
            }

            if (!puestoPeaje) {
                mostrarMensaje('Debe especificar un puesto', 'error');
                return;
            }
            
            const params = `cedula=${encodeURIComponent(cedula)}&tipo=${encodeURIComponent(tipoBonificacion)}&puestoPeaje=${encodeURIComponent(puestoPeaje)}`;
            submit('/bonificaciones/asignarBonificacion?' + params);
        }

        function mostrar_bonificacionYaAsignada(mensaje) {
            mostrarMensaje(mensaje || 'Ya tiene una bonificación para el puesto seleccionado', 'error');
        }

        function mostrar_bonificacionAsignada(resultado) {
            mostrarMensaje('Bonificación asignada exitosamente', 'exito');
            
            // Agregar la bonificación asignada a la lista
            const cedula = document.getElementById('cedulaPropietario').value;
            const tipoBonificacion = document.getElementById('tipoBonificacion').value;
            const puestoPeaje = document.getElementById('puestoPeaje').value;
            const propietarioNombre = document.getElementById('nombrePropietario').textContent;
            
            // Crear fecha local en formato YYYY-MM-DD
            const hoy = new Date();
            const fechaLocal = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}-${String(hoy.getDate()).padStart(2, '0')}`;
            
            bonificacionesAsignadas.push({
                propietarioNombre: propietarioNombre,
                nombre: tipoBonificacion,
                puestoPeaje: puestoPeaje,
                fechaAsignacion: fechaLocal
            });
            
            // Actualizar la vista de bonificaciones asignadas
            mostrar_bonificacionesAsignadas();
            
            // Limpiar solo los selectores (mantener info del propietario para asignar más bonificaciones)
            document.getElementById('tipoBonificacion').value = '';
            document.getElementById('puestoPeaje').value = '';
            
            // Recargar las bonificaciones del propietario
            const params = `cedula=${encodeURIComponent(cedula)}`;
            submit('/bonificaciones/obtenerBonificacionesPorCedula?' + params);
        }

        function mostrarMensaje(texto, tipo) {
            const div = document.getElementById('mensajeResultado');
            div.textContent = texto;
            div.className = 'mensaje-resultado ' + tipo;
            div.style.display = 'block';
            
            setTimeout(() => {
                div.style.display = 'none';
            }, 5000);
        }

        function volverAlTablero() {
            // Limpiar localStorage antes de navegar
            localStorage.removeItem('propietario_bonificaciones');
            localStorage.removeItem('bonificaciones_propietario');
            
            window.location.href = '/tableroAdministrador.html';
        }

        function limpiarBusqueda() {
            // Limpiar localStorage
            localStorage.removeItem('propietario_bonificaciones');
            localStorage.removeItem('bonificaciones_propietario');
            
            // Limpiar campos del formulario
            document.getElementById('cedulaPropietario').value = '';
            document.getElementById('infoPropietario').style.display = 'none';
            document.getElementById('nombrePropietario').textContent = '';
            document.getElementById('estadoPropietario').textContent = '';
            document.getElementById('bonificacionesPropietario').innerHTML = '';
        }

        function mostrar_usuarioNoAutenticado(urlDestino) {
            window.location.href = urlDestino;
        }

        function procesarErrorSubmit(status, text) {
            console.error('Error en submit:', status, text);
        }
    </script>
</body>
</html>
