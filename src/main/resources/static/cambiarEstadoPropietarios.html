<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Estado de Propietarios - Sistema de Peajes</title>
    <link rel="stylesheet" href="css/estilos.css">
    <script src="vistaWeb.js"></script>
</head>
<body>
    <script src="utilesVista.js"></script>
    
    <div class="admin-container">
        <div class="admin-card">
            <div class="admin-header">
                <div class="header-icon">👥</div>
                <div>
                    <h1>Cambiar Estado de Propietarios</h1>
                    <p class="header-subtitle">Modifique el estado de los propietarios del sistema (Habilitado, Penalizado, Suspendido, Deshabilitado).</p>
                </div>
            </div>

            <div class="form-section">
                <div class="form-row">
                    <div class="form-group">
                        <label for="cedulaPropietario">Cédula de identidad</label>
                        <input type="text" id="cedulaPropietario" placeholder="Ej: 12345678">
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end;">
                        <button class="btn-secundario" onclick="buscarPropietario()" style="width: 100%;">Buscar propietario</button>
                    </div>
                </div>

                <div id="infoPropietario" style="display: none; background: #d6eaf8; padding: 15px; border-radius: 6px; margin-bottom: 20px; border-left: 4px solid #3498db;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h4 style="margin: 0 0 10px 0;">Propietario</h4>
                        <button onclick="limpiarBusqueda()" style="background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;">Limpiar</button>
                    </div>
                    <p style="margin: 5px 0;"><strong>Nombre:</strong> <span id="nombrePropietario"></span></p>
                    <p style="margin: 5px 0;"><strong>Estado actual:</strong> <span id="estadoActualPropietario"></span></p>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="nuevoEstado">Nuevo Estado</label>
                        <select id="nuevoEstado">
                            <option value="">Seleccione un estado...</option>
                        </select>
                        <p class="form-hint">El estado actual se mostrará preseleccionado.</p>
                    </div>
                </div>

                <button class="btn-accion" onclick="cambiarEstado()">Cambiar Estado</button>
                <button class="btn-volver" onclick="volverAlTablero()">Volver al Panel</button>
            </div>

            <div id="mensajeResultado" class="mensaje-resultado" style="display: none;"></div>
        </div>
    </div>

    <script>
        urlIniciarVista = "/estados/cargarVistaCambioEstado";
        
        function primerSubmitFinalizado() {
            cargarEstados();
            // Restaurar datos del localStorage si existen
            restaurarDatosLocalStorage();
        }

        function cargarEstados() {
            submit('/estados/obtenerEstados');
        }

        function mostrar_estadosDisponibles(estados) {
            const select = document.getElementById('nuevoEstado');
            select.innerHTML = '<option value="">Seleccione un estado...</option>';
            
            estados.forEach(e => {
                const option = document.createElement('option');
                option.value = e.nombreEstado;
                option.textContent = e.nombreEstado;
                select.appendChild(option);
            });
        }

        function buscarPropietario() {
            const cedula = document.getElementById('cedulaPropietario').value;
            
            if (!cedula) {
                mostrarMensaje('Por favor ingrese una cédula', 'error');
                return;
            }
            
            const params = `cedula=${encodeURIComponent(cedula)}`;
            submit('/propietario/obtenerUsuario?' + params);
        }

        function mostrar_propietario(data) {
            document.getElementById('nombrePropietario').textContent = data.nombreCompleto;
            document.getElementById('estadoActualPropietario').textContent = data.estadoNombre;
            
            // Preseleccionar el estado actual en el select
            const selectEstado = document.getElementById('nuevoEstado');
            selectEstado.value = data.estadoNombre;
            
            document.getElementById('infoPropietario').style.display = 'block';
            
            // Guardar en localStorage
            const datosGuardar = {
                cedula: document.getElementById('cedulaPropietario').value,
                nombreCompleto: data.nombreCompleto,
                estadoNombre: data.estadoNombre
            };
            localStorage.setItem('propietario_cambio_estado', JSON.stringify(datosGuardar));
        }

        function restaurarDatosLocalStorage() {
            const datosGuardados = localStorage.getItem('propietario_cambio_estado');
            
            if (datosGuardados) {
                try {
                    const datos = JSON.parse(datosGuardados);
                    
                    // Restaurar campo de cédula
                    document.getElementById('cedulaPropietario').value = datos.cedula || '';
                    
                    // Restaurar información del propietario
                    document.getElementById('nombrePropietario').textContent = datos.nombreCompleto || '';
                    document.getElementById('estadoActualPropietario').textContent = datos.estadoNombre || '';
                    
                    // Preseleccionar el estado actual en el select
                    const selectEstado = document.getElementById('nuevoEstado');
                    selectEstado.value = datos.estadoNombre || '';
                    
                    document.getElementById('infoPropietario').style.display = 'block';
                } catch (e) {
                    console.error('Error al restaurar datos del localStorage:', e);
                }
            }
        }

        function mostrar_propietarioNoEncontrado(mensaje) {
            mostrarMensaje(mensaje || 'No existe el propietario', 'error');
            document.getElementById('infoPropietario').style.display = 'none';
            
            // Limpiar localStorage cuando no se encuentra el propietario
            localStorage.removeItem('propietario_cambio_estado');
        }
        
        window.addEventListener('DOMContentLoaded', function() {
        });

        function cambiarEstado() {
            const cedula = document.getElementById('cedulaPropietario').value;
            const nuevoEstado = document.getElementById('nuevoEstado').value;

            if (!cedula) {
                mostrarMensaje('Por favor ingrese una cédula', 'error');
                return;
            }

            if (!nuevoEstado) {
                mostrarMensaje('Debe especificar un estado', 'error');
                return;
            }

            const params = `cedula=${encodeURIComponent(cedula)}&nuevoEstado=${encodeURIComponent(nuevoEstado)}`;
            submit('/estados/cambiarEstadoPropietario?' + params);
        }

        function mostrar_estadoYaAsignado(mensaje) {
            mostrarMensaje(mensaje || 'El propietario ya está en estado ' + document.getElementById('nuevoEstado').value, 'error');
        }

        function mostrar_estadoCambiado(resultado) {
            mostrarMensaje('Estado del propietario actualizado correctamente', 'exito');
            document.getElementById('cedulaPropietario').value = '';
            document.getElementById('nuevoEstado').value = '';
            document.getElementById('infoPropietario').style.display = 'none';
            
            // Limpiar localStorage al cambiar estado exitosamente
            localStorage.removeItem('propietario_cambio_estado');
        }

        function mostrarMensaje(texto, tipo) {
            const div = document.getElementById('mensajeResultado');
            div.textContent = texto;
            div.className = 'mensaje-resultado ' + tipo;
            div.style.display = 'block';
            
            setTimeout(() => {
                div.style.display = 'none';
            }, 5000);
        }

        function volverAlTablero() {
            // Limpiar localStorage antes de navegar
            localStorage.removeItem('propietario_cambio_estado');
            
            window.location.href = '/tableroAdministrador.html';
        }

        function limpiarBusqueda() {
            // Limpiar localStorage
            localStorage.removeItem('propietario_cambio_estado');
            
            // Limpiar campos del formulario
            document.getElementById('cedulaPropietario').value = '';
            document.getElementById('infoPropietario').style.display = 'none';
            document.getElementById('nombrePropietario').textContent = '';
            document.getElementById('estadoActualPropietario').textContent = '';
            document.getElementById('nuevoEstado').value = '';
        }

        function mostrar_usuarioNoAutenticado(urlDestino) {
            window.location.href = urlDestino;
        }

        function procesarErrorSubmit(status, text) {
            console.error('Error en submit:', status, text);
            mostrarMensaje('Error: ' + text, 'error');
        }
    </script>
</body>
</html>
