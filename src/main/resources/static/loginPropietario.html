<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Propietario - Sistema de Peajes</title>
    <link rel="stylesheet" href="css/estilos.css">
    <script src="vistaWeb.js"></script>
</head>
<body>
    <script src="utilesVista.js"></script>
    <h1>🚗 Login Propietario</h1>
    <div class="container-login">
        <form id="formLoginPropietario" action="/acceso/loginPropietario" method="post" onsubmit="acceder(event);">
            <div>
                <label for="cedula">Cédula:</label>
                <input type="text" id="cedula" name="cedula" required>
            </div>
            <div>
                <label for="contrasenia">Contraseña:</label>
                <input type="password" id="contrasenia" name="contrasenia" required>
            </div>
            <button type="submit">Ingresar</button>
        </form>
    </div>
    <div id="mensajes"></div>

</body>
    <script>
        function acceder(event) {
            console.log('acceder function called');
            event.preventDefault();
            
            // Debug: verificar que el formulario existe
            const form = document.getElementById("formLoginPropietario");
            console.log('Form element:', form);
            console.log('Form tag name:', form ? form.tagName : 'null');
            
            const serializedData = serializarFormulario("formLoginPropietario");
            console.log('Serialized data:', serializedData);
            
            if (serializedData) {
                console.log('Enviando request a /login/loginPropietario con datos:', serializedData);
                submit("/acceso/loginPropietario", serializedData);
            } else {
                console.error('No se pudo serializar el formulario');
                document.getElementById('mensajes').innerHTML = 
                    '<p class="error">❌ Error al procesar el formulario</p>';
            }
        }

        // Función que maneja excepciones de aplicación (credenciales incorrectas)
        async function excepcionDeAplicacion(text) {
            console.log('excepcionDeAplicacion called with:', text);
            document.getElementById('mensajes').innerHTML = 
                `<p class="error">❌ ${text}</p>`;
        }

        // Función que maneja el login exitoso
        function mostrar_loginExitoso(urlDestino) {
            console.log('mostrar_loginExitoso called with:', urlDestino);
            console.log('Redirigiendo a:', urlDestino);
            window.location.href = urlDestino;
        }

        // Función de debug para ver la respuesta completa
        function procesarRespuestaSubmit(text) {
            console.log('procesarRespuestaSubmit called with raw text:', text);
            try {
                const json = JSON.parse(text);
                console.log('Parsed JSON:', json);
            } catch (e) {
                console.error('Error parsing JSON:', e);
            }
        }

        // Función que maneja errores de conexión/servidor
        function procesarErrorSubmit(status, text) {
            console.log('procesarErrorSubmit called with:', status, text);
            document.getElementById('mensajes').innerHTML = 
                '<p class="error">⚠️ Error de conexión. Intente nuevamente.</p>';
        }
    </script>
</html>
