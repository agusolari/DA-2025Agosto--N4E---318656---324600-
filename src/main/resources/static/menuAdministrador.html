<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Menú Administrador</title>
    <script src="/js/utilesVista.js"></script>
    <script src="/js/vistaWeb.js"></script>
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
    <h1>Menú Administrador</h1>
    <div id="menuOpciones">
        <button onclick="irA('/administrador/gestionPropietarios')">Gestión de Propietarios</button>
        <button onclick="irA('/administrador/gestionPeajes')">Gestión de Peajes</button>
        <button onclick="irA('/administrador/gestionTarifas')">Gestión de Tarifas</button>
        <button onclick="irA('/administrador/reportes')">Reportes</button>
        <button onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <div id="mensajes"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            verificarSesion();
        });

        function verificarSesion() {
            fetch('/sesion/verificar')
                .then(response => {
                    if (!response.ok) {
                        window.location.href = '/index.html';
                    }
                });
        }

        function cerrarSesion() {
            fetch('/sesion/cerrar', { method: 'POST' })
                .then(() => {
                    window.location.href = '/index.html';
                });
        }

        function irA(ruta) {
            window.location.href = ruta;
        }
    </script>
</body>
</html>
