<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Menú Propietario</title>
    <script src="/js/utilesVista.js"></script>
    <script src="/js/vistaWeb.js"></script>
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
    <h1>Menú Propietario</h1>
    <div id="menuOpciones">
        <button onclick="irA('/propietario/misVehiculos')">Mis Vehículos</button>
        <button onclick="irA('/propietario/recargarSaldo')">Recargar Saldo</button>
        <button onclick="irA('/propietario/misBonificaciones')">Mis Bonificaciones</button>
        <button onclick="irA('/propietario/misTransitos')">Historial de Tránsitos</button>
        <button onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <div id="mensajes"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            verificarSesion();
            mostrarSaldo();
        });

        function verificarSesion() {
            fetch('/sesion/verificar')
                .then(response => {
                    if (!response.ok) {
                        window.location.href = '/index.html';
                    }
                });
        }

        function mostrarSaldo() {
            fetch('/propietario/saldo')
                .then(response => response.json())
                .then(data => {
                    const mensajes = document.getElementById('mensajes');
                    mensajes.innerHTML = `<p>Saldo actual: $${data.saldo}</p>`;
                });
        }

        function cerrarSesion() {
            fetch('/sesion/cerrar', { method: 'POST' })
                .then(() => {
                    window.location.href = '/index.html';
                });
        }

        function irA(ruta) {
            window.location.href = ruta;
        }
    </script>
</body>
</html>
